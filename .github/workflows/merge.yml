name: Merge URLs Content

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 MSK (UTC+3)
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run merge script
        run: python merge_urls.py --input urls.txt --output-dir config --lines-per-file 10000 --concurrency 30 --clean-urls

      - name: Upload config folder
        uses: actions/upload-artifact@v4
        with:
          path: config/

      - name: Upload broken URLs (optional)
        uses: actions/upload-artifact@v4
        with:
          name: broken-urls
          path: broken_urls.txt
