name: Merge URLs Content

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 MSK
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run merge script
        run: python merge_urls.py --input urls.txt --output-dir config --lines-per-file 1500

      - name: Upload config folder (optional)
        uses: actions/upload-artifact@v4
        with:
          name: merged-files
          path: config/
