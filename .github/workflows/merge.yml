name: Fetch VPN Configs

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 MSK (UTC+3)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run fetch script
        run: python merge.py --input urls.txt --output-dir config --lines-per-file 5000 --concurrency 30 --clean-urls

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/ broken_urls.txt urls.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update: fetch VPN configs [skip ci]"
          git push
